name: Oracle Auto Create Instance
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: openssl, mbstring

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create Private Key File
        run: |
          printf "%s" "${{ secrets.OCI_PRIVATE_KEY }}" > private.pem
          chmod 600 private.pem

      - name: Run Oracle Bot
        env:
          # Các biến bảo mật (Bắt buộc để trong Secrets)
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}

          # CÁC BIẾN HARDCODE (Để tránh lỗi Parse Body)
          OCI_PRIVATE_KEY_FILENAME: private.pem
          OCI_SHAPE: VM.Standard.A1.Flex
          OCI_OCPUS: "4"
          OCI_MEMORY_IN_GBS: "24"
          OCI_DISPLAY_NAME: "Oracle-ARM-Auto"
          # THAY MÃ AD CỦA BẠN VÀO ĐÂY:
          OCI_AVAILABILITY_DOMAIN: "uUKR:AP-SINGAPORE-1-AD-1"
        run: php index.php
